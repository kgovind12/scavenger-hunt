<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ikea Hiders Upload</title>
  <style>
    body {
      background-color: #FFD700;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      padding-top: 100px;
    }

    header {
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 40px;
    }

    #found-button {
      position: fixed;
      top: 20px;
      right: 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 15px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    }

    #help-button {
      position: fixed;
      top: 20px;
      left: 20px;
      background-color: #ff2700;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 15px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    }

    .category-section {
      background-color: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 2px 2px 6px rgba(0, 0, 0, 0.1);
      border-left: 5px solid royalblue;
      display: flex;
      flex-direction: column;
    }

    .category-section h3 {
      margin-top: 0;
    }

    .upload-box {
      border: 2px dashed royalblue;
      padding: 10px;
      display: inline-block;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .upload-box input[type="file"] {
      border: none;
      background: none;
    }

    .upload-preview {
      margin-top: 10px;
      max-width: 100px;
      max-height: 100px;
      border-radius: 8px;
    }

    .success-message {
      color: green;
      font-size: 14px;
      margin-top: 8px;
    }

    /* Popup Styles */
    .popup-overlay {
      position: fixed;
      inset: 0;
      z-index: 999;
      animation: fadeIn 0.3s ease-in-out;
    }

    .popup-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
    }

    .popup-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 30px 25px;
      border-radius: 16px;
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2);
      width: 300px;
      text-align: center;
      font-family: Arial, sans-serif;
      z-index: 1000;
    }

    .popup-container h2 {
      margin-top: 0;
      margin-bottom: 20px;
    }

    .popup-container p {
      margin-bottom: 10px;
      font-size: 14px;
      color: #555;
    }

    .popup-container input[type="text"] {
      width: 80%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 14px;
    }

    .popup-buttons {
      display: flex;
      justify-content: space-evenly;
      align-items: center;
    }

    .popup-buttons button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 10px;
    }

    #submit-name {
      background-color: #007bff;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    #close-popup {
      background-color: #ccc;
      color: black;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    #all-items-ok {
      background-color: #007bff;
      color: white;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .spinner {
      width: 16px;
      height: 16px;
      margin-left: 8px;
      border: 2px solid transparent;
      border-top: 2px solid #ffffff;
      border-right: 2px solid #ffffff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      display: inline-block;
      box-sizing: border-box;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #screenblock {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background-color: rgba(103, 103, 103, 1);
      color: white;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

  </style>
</head>
<body>
  <div id="screenblock"></div>

  <button id="found-button">I've been found!</button>
  <button id="help-button" onclick="openSMS()">Help</button>

  <header>Welcome Ikea Hiders, upload pictures of your items here!</header>

  <form id="uploadForm"></form>

    <!-- Found Popup -->
    <div id="found-popup" class="popup-overlay" style="display: none;">
      <div class="popup-backdrop"></div>

      <div class="popup-container">
        <h2>You've been found!</h2>
        <p>Please enter your player number:</p>
        <input type="text" id="finder-name" placeholder="Your player number" />
        <div class="popup-buttons">
          <button id="submit-name">Submit <span id="loader" class="spinner" style="display: none;"></span> </button>
          <button id="close-popup">Cancel</button>
        </div>
      </div>
    </div>

    <!-- All Items Found Popup -->
    <div id="all-items-popup" class="popup-overlay" style="display: none;">
      <div class="popup-backdrop"></div>
      <div class="popup-container">
        <h2>🎉 Congratulations!</h2>
        <p>You have found all the hidden items! Please return to the home base.</p>
        <button id="all-items-ok">OK</button>
      </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <script>
      let currentRound;
      let currentRoundPassword;
      let currentRoundConfig;

      async function loadRoundConfig() {
        const response = await fetch('/rounds.json');
        const data = await response.json();
        currentRound = data.currentRound;
        const roundData = data.rounds.find(r => r.id === currentRound);
        if (!roundData) {
          throw new Error(`Round ${currentRound} not found`);
        }
        currentRoundPassword = roundData.password || '';
        currentRoundConfig = roundData;
        return roundData;
      }

      async function checkAccess() {
        const overlay = document.getElementById('screenblock');

        try {
          await loadRoundConfig();

          const granted = sessionStorage.getItem('hiderAccess');
          const grantedRound = sessionStorage.getItem('hiderRound');
          if (granted === 'granted' && Number(grantedRound) === currentRound) {
            overlay.style.display = 'none';
            return;
          }

          const password = prompt("Enter the password to access this page:");
          if (password === currentRoundPassword) {
            sessionStorage.setItem('hiderAccess', 'granted');
            sessionStorage.setItem('hiderRound', String(currentRound));
            overlay.style.display = 'none';
          } else {
            alert("Wrong password! Redirecting...");
            window.location.href = '/';
          }
        } catch (error) {
          console.error('Failed to load round config:', error);
          alert('Could not verify access. Please try again later.');
          window.location.href = '/';
        }
      }

      checkAccess().then(initializeRound);

      // Your web app's Firebase configuration
      // For Firebase JS SDK v7.20.0 and later, measurementId is optional
      const firebaseConfig = {
        apiKey: "AIzaSyC1RdUtKa1cZ0osTSZd93GdcbOS0w54JYU",
        authDomain: "scavenger-hunt-4173c.firebaseapp.com",
        databaseURL: "https://scavenger-hunt-4173c-default-rtdb.firebaseio.com",
        projectId: "scavenger-hunt-4173c",
        storageBucket: "scavenger-hunt-4173c.firebasestorage.app",
        messagingSenderId: "265944270299",
        appId: "1:265944270299:web:baef35722c962f1a0853fe",
        measurementId: "G-PT9XTPCF1H"
      };

      
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const foundButton = document.getElementById('found-button');
  const popup = document.getElementById('found-popup');
  const submitBtn = document.getElementById('submit-name');
  const closeBtn = document.getElementById('close-popup');
  const nameInput = document.getElementById('finder-name');

  foundButton.addEventListener('click', () => {
    popup.style.display = 'block';
    nameInput.value = '';
  });

  closeBtn.addEventListener('click', () => {
    popup.style.display = 'none';
  });

  submitBtn.addEventListener('click', async () => {
    const name = nameInput.value.trim();
    if (!name) return alert("Please enter your player number.");

    // Show loader and disable button
    const loader = document.getElementById('loader');
    submitBtn.disabled = true;
    loader.style.display = 'inline';

    try {
      const response = await fetch('/found', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ name })
      });

      const data = await response.json();
      if (!response.ok) {
        if (response.status === 409) {
          alert(`Player ${name}, you have already been found. Please return to home base.`);
          popup.style.display = 'none';
          return;
        }
        throw new Error(data.error || 'Unable to report found');
      }

      popup.style.display = 'none';
      window.location.href = "/endgame.html";

    } catch (err) {
        console.error(err);
        alert(err.message || "Something went wrong. Please try again.");
        submitBtn.disabled = false;
    } finally {
        // Re-enable button and hide loader (only if not redirected)
        submitBtn.disabled = false;
        loader.style.display = 'none';
    }
  });

    function optimizeCloudinaryUrl(originalUrl) {
      if (!originalUrl.includes('/upload/')) return originalUrl;
      return originalUrl.replace('/upload/', '/upload/q_auto,f_auto,w_600/');
    }

    // 🔁 Handle all file inputs
    function attachFileListeners() {
      document.querySelectorAll('input[type="file"]').forEach(input => {
      input.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        const section = e.target.closest('.category-section');
        const preview = section.querySelector('.upload-preview');
        const successMsg = section.querySelector('.success-message');
        const category = section.getAttribute('data-category');

        if (!file) return;

        try {
          const compressedBlob = await compressImage(file, 800, 0.4); // width: 800px, quality: 40%
          console.log("Compressed blob:", compressedBlob);

          // Preview image
          const reader = new FileReader();
          reader.onload = () => {
            preview.src = reader.result;
          };
          reader.readAsDataURL(file);

          // Upload to Node.js server
          const formData = new FormData();
          formData.append("image", compressedBlob, "compressed.jpg");
          formData.append('category', category);

          const response = await fetch('/upload', {
            method: 'POST',
            body: formData,
          });

          const text = await response.text();
          if (!response.ok) {
            throw new Error("Upload failed: " + text);
          }

          const data = JSON.parse(text);
          const imageUrl = data.imageUrl;

          await db.collection('images').doc(category).set({
            imageUrl: imageUrl,
            category: category,
            found: true,
            approved: false,
            rejected: false
          });

          successMsg.innerText = "Pending approval";
          successMsg.style.color = 'green';

        } catch (err) {
          console.error(err);
          alert(err);
          successMsg.innerText = "Upload failed!";
          successMsg.style.color = 'red';
        }
      });
      });
    }

    async function compressImage(file, maxWidth, quality) {
      const image = new Image();
      const reader = new FileReader();

      return new Promise((resolve, reject) => {
        reader.onload = () => {
          image.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);

        image.onload = () => {
          const canvas = document.createElement("canvas");
          const scale = maxWidth / image.width;
          const width = Math.min(image.width, maxWidth);
          const height = image.height * scale;

          canvas.width = width;
          canvas.height = height;

          const ctx = canvas.getContext("2d");
          ctx.drawImage(image, 0, 0, width, height);
          canvas.toBlob((blob) => {
            resolve(blob);
          }, "image/jpeg", quality);
        };
        image.onerror = reject;
      });
    }

    // List of all required categories
    // const allCategories = [
    //   "malm", "pax", "duktig", "sparka", "finnala",
    //   "soderhamn", "utespelare", "bild", "stockholm", "lockig",
    //   "pluttis"
    // ];

    let allCategories;

    // Load rounds.json and initialize
    async function initializeRound() {
      try {
        const roundData = currentRoundConfig || await loadRoundConfig();
        currentRound = currentRoundConfig ? currentRoundConfig.id : roundData.id;
        
        // Store in localStorage for persistence
        localStorage.setItem('currentRound', currentRound);
        
        const items = roundData.items;
        allCategories = items.map(item => item.toLowerCase());

        // Generate category sections dynamically
        const uploadForm = document.getElementById('uploadForm');
        items.forEach(item => {
          const categoryLower = item.toLowerCase();
          const section = document.createElement('div');
          section.className = 'category-section';
          section.setAttribute('data-category', categoryLower);
          section.innerHTML = `
            <h3>${item}</h3>
            <div class="upload-box">
              <input type="file" name="${categoryLower}" accept="image/*" capture="camera" />
            </div>
            <img class="upload-preview" />
            <div class="success-message"></div>
          `;
          uploadForm.appendChild(section);
        });

        // Attach file listeners after generating sections
        attachFileListeners();
      } catch (error) {
        console.error('Failed to load rounds:', error);
        alert('Error loading round data');
      }
    }

    const allItemsPopup = document.getElementById("all-items-popup");
    const allItemsOkButton = document.getElementById("all-items-ok");

    // pending approval listener
    db.collection('images')
      .where('found', '==', true)
      .where('approved', '==', false)
      .where('rejected', '==', false)
      .onSnapshot(snapshot => {
        snapshot.docChanges().forEach(change => {
          if (change.type === "added" || change.type === "modified") {
            const data = change.doc.data();
            const section = document.querySelector(`.category-section[data-category="${data.category}"]`);
            if (section) {
              const msg = section.querySelector('.success-message');
              const preview = section.querySelector('.upload-preview');
              msg.innerText = "Pending approval";
              msg.style.color = 'green';
              if (data.imageUrl) preview.src = optimizeCloudinaryUrl(data.imageUrl);
            }
          }
        });
    });

    // rejected listener
    db.collection('images')
      .where('rejected', '==', true)
      .onSnapshot(snapshot => {
        snapshot.docChanges().forEach(change => {
          if (change.type === "added" || change.type === "modified") {
            const data = change.doc.data();
            const section = document.querySelector(`.category-section[data-category="${data.category}"]`);
            if (section) {
              const msg = section.querySelector('.success-message');
              const preview = section.querySelector('.upload-preview');
              msg.innerText = "Rejected. Please upload new image.";
              msg.style.color = 'red';
              if (data.imageUrl) preview.src = optimizeCloudinaryUrl(data.imageUrl);
            }
          }
        });
    });

    // Approved listener
    const approvedCategories = new Set();

    db.collection('images')
      .where('approved', '==', true)
      .onSnapshot(snapshot => {
        approvedCategories.clear();
        snapshot.forEach(doc => {
          const { category, imageUrl } = doc.data();
          if (allCategories.includes(category)) {
            approvedCategories.add(category);
            const section = document.querySelector(`.category-section[data-category="${category}"]`);
            if (section) {
              const msg = section.querySelector('.success-message');
              const preview = section.querySelector('.upload-preview');
              msg.innerText = "Approved!";
              msg.style.color = 'green';
              if (imageUrl) preview.src = optimizeCloudinaryUrl(imageUrl);
              const fileInput = section.querySelector('.upload-box');
              if (fileInput) fileInput.style.display = 'none';
            }
          }
        });

        if (approvedCategories.size === allCategories.length) {
          allItemsPopup.style.display = 'block';

          // Mark the game as lost for seekers once all items are approved
          db.collection('meta').doc('status').set({ seekersLost: true }, { merge: true })
            .catch(err => {
              console.error('Failed to set seekersLost:', err);
            });
        }
    });

    // Handle OK button to return to home page
    allItemsOkButton.addEventListener('click', () => {
      allItemsPopup.style.display = 'none';
      window.location.href = '/';
    });

    // help button
    function openSMS() {
      const phoneNumber = "+19253362076";
      const message = "I need help!";
      const encodedMessage = encodeURIComponent(message);

      const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

      // Use ?body= on iOS, &body= on Android — but fallback to just ?body= is often safer
      let smsUrl;

      if (isIOS) {
        smsUrl = `sms:${phoneNumber}&body=${encodedMessage}`;
        // iOS often requires just `sms:<number>&body=` without the semicolon or question mark
      } else {
        smsUrl = `sms:${phoneNumber}?body=${encodedMessage}`;
      }
      window.location.href = smsUrl;
    }

  </script>
</body>
</html>
